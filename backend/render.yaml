# Render Blueprint Configuration
# https://render.com/docs/blueprint-spec
#
# Deploy with: Connect GitHub repo in Render Dashboard
# Or use: render blueprint launch

services:
  # Main Flask API Web Service
  - type: web
    name: weni-roadmap-backend
    runtime: python
    region: oregon  # Change to your preferred region

    # Build configuration
    rootDir: backend
    buildCommand: pip install -r requirements.txt

    # Start command using gunicorn
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 run:app

    # Health check endpoint
    healthCheckPath: /api/v1/health

    # Auto-deploy on push to main branch
    autoDeploy: true

    # Environment variables (secrets should be added via Render Dashboard)
    envVars:
      # Flask configuration
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true  # Render generates a secure random value

      # Python configuration
      - key: PYTHON_VERSION
        value: "3.11.0"

      # CORS - Update with your frontend URL
      - key: ALLOWED_ORIGINS
        value: https://weni-roadmap.netlify.app

      # Sync configuration
      - key: ENABLE_SYNC
        value: "true"
      - key: SYNC_INTERVAL_MINUTES
        value: "5"

      # Cache configuration
      - key: CACHE_TYPE
        value: simple

      # JIRA credentials (set these in Render Dashboard as secrets)
      # - key: JIRA_BASE_URL
      #   sync: false
      # - key: JIRA_EMAIL
      #   sync: false
      # - key: JIRA_API_TOKEN
      #   sync: false

    # Instance type (free tier available)
    plan: free
