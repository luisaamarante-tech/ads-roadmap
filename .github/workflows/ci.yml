# CI/CD Pipeline
# Constitution: "Run pre-commit hooks (linters, formatters, and tests) on every commit"
# Constitution: "CI validates linting and coverage thresholds"

name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
      - feature/*
      - fix/*
  pull_request:
    branches:
      - main
      - develop

jobs:
  # Backend tests and linting
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Black
        run: black --check app/ tests/

      - name: Run isort
        run: isort --check-only --diff app/ tests/

      - name: Run Flake8
        run: flake8 app/ tests/

      - name: Run tests with coverage
        run: |
          # Coverage threshold at 80% - interactive CLI commands excluded via # pragma: no cover
          pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: backend
          name: backend-coverage
        continue-on-error: true

  # Frontend tests and linting
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint:check

      - name: Run Prettier
        run: npm run format:check

      - name: Run Stylelint
        run: npm run stylelint:check

      - name: Run type check
        run: npm run type-check

      - name: Run tests with coverage
        run: npm run test:coverage
        env:
          VITE_WEBCHAT_CHANNEL_UUID: test-channel-uuid

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage/coverage-final.json
          flags: frontend
          name: frontend-coverage
        continue-on-error: true

  # Build check
  build:
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Build frontend
        run: cd frontend && npm run build

      - name: Build Docker images (test)
        run: |
          docker build -t weni-roadmap-backend ./backend -f backend/docker/Dockerfile
          docker build -t weni-roadmap-frontend ./frontend -f frontend/docker/Dockerfile
